description: Siemens MindSphere (Insights Hub) does not publish a unified public rate-limits document.
  API throttle behavior, ingest ceilings, and quota structures vary by tenant configuration and contracted
  package. Limits and response semantics are documented inside the customer-specific developer portal.
sources:
  - https://siemens.mindsphere.io/
notes: Public rate-limit specification not located. Limits are tenant- and contract-driven; reconciliation
  pending tenant-level documentation.
limits:
  - name: Per-tenant limits
    scope: tenant
    metric: varies
    limit: see tenant developer portal
    notes: API call rates, time-series ingest rates, and asset/agent counts are configured per tenant
      contract.
policies:
  - name: Tenant-Configured Throttling
    description: MindSphere/Insights Hub limits are sized to the contracted tenant capacity; consumers
      should rely on the tenant developer portal for current ceilings and retry-after semantics.
