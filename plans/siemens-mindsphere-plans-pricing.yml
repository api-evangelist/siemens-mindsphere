description: Siemens MindSphere (now branded Insights Hub) does not publish a self-service public
  pricing page. Plans, asset/agent counts, data ingest, and API quotas are configured per-customer
  through Siemens Digital Industries sales as part of an enterprise IIoT platform agreement.
