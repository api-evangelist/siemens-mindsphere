vocabulary:
  name: Siemens MindSphere Platform Vocabulary
  description: >-
    Domain vocabulary and taxonomy for the Siemens MindSphere (Insights Hub)
    Industrial IoT platform, covering digital twin modeling, time series data,
    asset management, and industrial connectivity concepts.
  version: '1.0'
  created: '2026-05-02'
  provider: Siemens MindSphere

terms:
  - term: Asset
    definition: >-
      A digital representation of a physical industrial device, machine, system,
      or facility modeled as part of a hierarchical asset tree. Assets serve as
      the containers for IoT telemetry data, events, and files collected from
      connected industrial equipment.
    synonyms:
      - digital twin
      - industrial asset
      - device model

  - term: Aspect Type
    definition: >-
      A data schema template that defines the variables (measurements) collected
      from an aspect of an asset. Aspect types act as blueprints specifying the
      name, data type, unit, and searchability of each variable. Examples include
      "Temperature" aspects with temperature and humidity variables.
    synonyms:
      - data schema
      - measurement template

  - term: Asset Type
    definition: >-
      A hierarchical template that defines the structure and capabilities of an
      asset class, including which aspect types it contains. Asset types can
      inherit from parent types, enabling reusable component definitions across
      equipment families (e.g., "motor", "pump", "conveyor").
    synonyms:
      - equipment template
      - device type

  - term: Time Series
    definition: >-
      A sequence of timestamped measurement values stored for a specific asset
      and aspect combination. Time series data represents sensor readings, machine
      telemetry, and process variables collected over time from industrial
      equipment. Each data point includes the ISO 8601 UTC timestamp (_time)
      and aspect variable values.
    synonyms:
      - telemetry data
      - sensor data
      - measurement data

  - term: Aspect
    definition: >-
      A logical grouping of related measurement variables on an asset, typically
      representing a functional dimension of the equipment (e.g., "ElectricalData"
      or "MechanicalData"). Each asset instance has aspects defined by its asset
      type and aspect type associations.
    synonyms:
      - data aspect
      - measurement group

  - term: Agent
    definition: >-
      A MindConnect agent that acts as a gateway, connecting field-level industrial
      devices (PLCs, sensors, machines) to the MindSphere cloud platform. Agents
      handle data collection, buffering, and secure transmission to the cloud.
    synonyms:
      - MindConnect agent
      - IoT gateway

  - term: Twin Type
    definition: >-
      A classification of digital twin purpose: "performance" twins track real
      operational data, "simulation" twins model hypothetical behavior, and
      "aggregation" twins consolidate data across asset hierarchies.
    values:
      - performance
      - simulation
      - aggregation

  - term: Tenant
    definition: >-
      An isolated organizational environment within the MindSphere platform,
      equivalent to a cloud tenant. Each customer organization has its own
      tenant with separate user management, assets, data, and applications.
    synonyms:
      - environment
      - organization

  - term: Event Severity
    definition: >-
      A numeric classification of event criticality in MindSphere. Severity
      follows a standardized scale: 0=INFO, 20=MINOR, 30=WARNING, 40=MAJOR,
      50=CRITICAL. Events are typically generated by rule engines or connected
      devices when thresholds are exceeded.
    values:
      - '0: INFO'
      - '20: MINOR'
      - '30: WARNING'
      - '40: MAJOR'
      - '50: CRITICAL'

tags:
