specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Siemens MindSphere
providerId: siemens-mindsphere
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Industrial IoT
  - IIoT
  - Insights Hub
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps placeholder for Siemens MindSphere/Insights Hub. Pricing is contracted
  rather than self-service; cost is driven by tenant size, asset/agent counts, ingested data volume,
  and named users rather than per-API-call charges.
sources:
  - https://siemens.mindsphere.io/
notes: No public billing model documented. FinOps treatment is contract-driven; reconciliation pending
  tenant-specific invoice and capacity terms.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Siemens AG
serviceCategory: Industrial IoT
billingModel:
  pricingCategory: Enterprise IIoT Subscription
  billingFrequency: Per-Contract
  billingCurrency: EUR/USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Siemens MindSphere
  ServiceCategory: Industrial IoT
  ProviderName: Siemens
  PublisherName: Siemens AG
  InvoiceIssuerName: Siemens AG
  BillingCurrency: EUR
meters:
  - name: tenant_subscription
    description: Tenant subscription fee covering platform access, included assets, and base data ingest.
    unit: month
    aggregation: sum
    dimensions:
      - tenant
      - region
  - name: asset_or_agent_count
    description: Number of connected industrial assets/agents against the contracted ceiling; primary
      MindSphere/Insights Hub sizing dimension.
    unit: asset
    aggregation: max
    dimensions:
      - tenant
      - asset_type
  - name: data_ingest
    description: Time-series and event data volume ingested into the tenant; usually capped per contract.
    unit: GB
    aggregation: sum
    dimensions:
      - tenant
      - source
principles:
  - name: Visibility
    description: Visibility is via the tenant admin console (assets, agents, data volume) and the
      Siemens enterprise invoice; no FOCUS export is publicly documented.
  - name: Allocation
    description: Allocate by tenant, plant/site, asset family, and the engineering team operating
      the connected equipment.
  - name: Optimization
    description: Optimize by retiring offline assets, sampling time-series at appropriate rates, and
      right-sizing tenant capacity at renewal rather than running at burst headroom continuously.
  - name: Accountability
    description: OT plant managers and central IIoT platform owners share accountability; procurement
      owns the contract and renewal terms.
maintainers:
