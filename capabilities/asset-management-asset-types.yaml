naftiko: 1.0.0-alpha2
info:
  label: Siemens MindSphere Asset Management API — Asset Types
  description: 'Siemens MindSphere Asset Management API — Asset Types. 3 operations. Lead operation: List asset types. Self-contained
    Naftiko capability covering one Siemens Mindsphere business surface.'
  tags:
  - Siemens Mindsphere
  - Asset Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIEMENS_MINDSPHERE_API_KEY: SIEMENS_MINDSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: asset-management-asset-types
    baseUri: https://gateway.eu1.mindsphere.io/api/assetmanagement/v3
    description: Siemens MindSphere Asset Management API — Asset Types business capability. Self-contained, no shared references.
    resources:
    - name: assettypes
      path: /assettypes
      operations:
      - name: listassettypes
        method: GET
        description: List asset types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
      - name: createassettype
        method: POST
        description: Create an asset type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assettypes-id
      path: /assettypes/{id}
      operations:
      - name: getassettype
        method: GET
        description: Retrieve an asset type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Asset type ID (tenant.name)
          required: true
    authentication:
      type: bearer
      token: '{{env.SIEMENS_MINDSPHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: asset-management-asset-types-rest
    port: 8080
    description: REST adapter for Siemens MindSphere Asset Management API — Asset Types. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/assettypes
      name: assettypes
      description: REST surface for assettypes.
      operations:
      - method: GET
        name: listassettypes
        description: List asset types
        call: asset-management-asset-types.listassettypes
        with:
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createassettype
        description: Create an asset type
        call: asset-management-asset-types.createassettype
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assettypes/{id}
      name: assettypes-id
      description: REST surface for assettypes-id.
      operations:
      - method: GET
        name: getassettype
        description: Retrieve an asset type
        call: asset-management-asset-types.getassettype
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asset-management-asset-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Siemens MindSphere Asset Management API — Asset Types. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-asset-types
      description: List asset types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-management-asset-types.listassettypes
      with:
        page: tools.page
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-asset-type
      description: Create an asset type
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: asset-management-asset-types.createassettype
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-asset-type
      description: Retrieve an asset type
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-management-asset-types.getassettype
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
