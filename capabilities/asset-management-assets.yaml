naftiko: 1.0.0-alpha2
info:
  label: Siemens MindSphere Asset Management API — Assets
  description: 'Siemens MindSphere Asset Management API — Assets. 5 operations. Lead operation: List all assets. Self-contained
    Naftiko capability covering one Siemens Mindsphere business surface.'
  tags:
  - Siemens Mindsphere
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIEMENS_MINDSPHERE_API_KEY: SIEMENS_MINDSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: asset-management-assets
    baseUri: https://gateway.eu1.mindsphere.io/api/assetmanagement/v3
    description: Siemens MindSphere Asset Management API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: assets
      path: /assets
      operations:
      - name: listassets
        method: GET
        description: List all assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
        - name: sort
          in: query
          type: string
        - name: filter
          in: query
          type: string
          description: JSON filter expression
      - name: createasset
        method: POST
        description: Create a new asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-assetId
      path: /assets/{assetId}
      operations:
      - name: getasset
        method: GET
        description: Retrieve an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateasset
        method: PATCH
        description: Update an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: If-Match
          in: header
          type: string
          description: ETag for optimistic concurrency control
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteasset
        method: DELETE
        description: Delete an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: If-Match
          in: header
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SIEMENS_MINDSPHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: asset-management-assets-rest
    port: 8080
    description: REST adapter for Siemens MindSphere Asset Management API — Assets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/assets
      name: assets
      description: REST surface for assets.
      operations:
      - method: GET
        name: listassets
        description: List all assets
        call: asset-management-assets.listassets
        with:
          page: rest.page
          size: rest.size
          sort: rest.sort
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createasset
        description: Create a new asset
        call: asset-management-assets.createasset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/{assetid}
      name: assets-assetid
      description: REST surface for assets-assetId.
      operations:
      - method: GET
        name: getasset
        description: Retrieve an asset
        call: asset-management-assets.getasset
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateasset
        description: Update an asset
        call: asset-management-assets.updateasset
        with:
          If-Match: rest.If-Match
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteasset
        description: Delete an asset
        call: asset-management-assets.deleteasset
        with:
          If-Match: rest.If-Match
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asset-management-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Siemens MindSphere Asset Management API — Assets. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-all-assets
      description: List all assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-management-assets.listassets
      with:
        page: tools.page
        size: tools.size
        sort: tools.sort
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-asset
      description: Create a new asset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: asset-management-assets.createasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-asset
      description: Retrieve an asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-management-assets.getasset
      outputParameters:
      - type: object
        mapping: $.
    - name: update-asset
      description: Update an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: asset-management-assets.updateasset
      with:
        If-Match: tools.If-Match
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-asset
      description: Delete an asset
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: asset-management-assets.deleteasset
      with:
        If-Match: tools.If-Match
      outputParameters:
      - type: object
        mapping: $.
