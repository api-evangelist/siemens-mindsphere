naftiko: "1.0.0-alpha1"

info:
  label: "Siemens MindSphere IoT Time Series API"
  description: "Time-series telemetry data ingestion and querying for industrial IoT sensors and machine data on MindSphere."
  tags:
    - IoT
    - Time Series
    - Telemetry
    - Industrial
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      MINDSPHERE_BEARER_TOKEN: MINDSPHERE_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: mindsphere-timeseries
      baseUri: https://gateway.eu1.mindsphere.io/api/iottimeseries/v3
      description: "MindSphere IoT Time Series REST API"
      authentication:
        type: bearer
        token: "{{MINDSPHERE_BEARER_TOKEN}}"
      resources:
        - name: timeseries-bulk
          path: /timeseries
          description: "Multi-asset time series ingestion"
          operations:
            - name: ingest-multi-timeseries
              method: PUT
              description: "Ingest time-series data for multiple asset aspects"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: timeseries
          path: /timeseries/{assetId}/{aspectName}
          description: "Single asset aspect time series operations"
          operations:
            - name: ingest-timeseries
              method: PUT
              description: "Ingest time-series data for a specific asset and aspect"
              inputParameters:
                - name: assetId
                  in: path
                  type: string
                  required: true
                  description: "Asset unique identifier"
                - name: aspectName
                  in: path
                  type: string
                  required: true
                  description: "Aspect name containing the time series variables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-timeseries
              method: GET
              description: "Query time-series data for a specific asset aspect"
              inputParameters:
                - name: assetId
                  in: path
                  type: string
                  required: true
                  description: "Asset unique identifier"
                - name: aspectName
                  in: path
                  type: string
                  required: true
                  description: "Aspect name to query"
                - name: from
                  in: query
                  type: string
                  required: false
                  description: "Start of time range (ISO 8601)"
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End of time range (ISO 8601)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of data points to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-timeseries
              method: DELETE
              description: "Delete time-series data for an asset aspect in a time range"
              inputParameters:
                - name: assetId
                  in: path
                  type: string
                  required: true
                  description: "Asset unique identifier"
                - name: aspectName
                  in: path
                  type: string
                  required: true
                  description: "Aspect name"
                - name: from
                  in: query
                  type: string
                  required: true
                  description: "Start of deletion range (ISO 8601)"
                - name: to
                  in: query
                  type: string
                  required: true
                  description: "End of deletion range (ISO 8601)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: mindsphere-timeseries-rest
      resources:
        - path: /v1/timeseries/{assetId}/{aspectName}
          name: timeseries
          operations:
            - method: GET
              name: get-timeseries
              description: "Query time-series data"
            - method: PUT
              name: ingest-timeseries
              description: "Ingest time-series data"

    - type: mcp
      port: 9101
      namespace: mindsphere-timeseries-mcp
      transport: http
      tools:
        - name: get-timeseries
          description: "Query industrial sensor time-series data from MindSphere"
          hints:
            readOnly: true
            openWorld: false
          call: "mindsphere-timeseries.get-timeseries"
          outputParameters:
            - type: object
              mapping: "$."
